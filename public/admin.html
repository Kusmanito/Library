<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Библиотека - Админка</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <nav class="container">
            <div class="logo">📚 Библиотека</div>
            <ul class="nav-links">
                <li><a href="/">Главная</a></li>
                <li><a href="/catalog.html">Каталог</a></li>
                <li><a href="/admin.html" class="active">Админка</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="admin-section">
            <div class="container">
                <h1>⚙️ Администрирование</h1>
                
                <div class="admin-tabs">
                    <button class="tab-btn active" onclick="showTab('add')">➕ Добавить</button>
                    <button class="tab-btn" onclick="showTab('manage')">📝 Управление</button>
                    <button class="tab-btn" onclick="showTab('loans')">📋 Выдача</button>
                    <button class="tab-btn" onclick="showTab('backup')">💾 Бэкап</button>
                </div>

                <!-- Добавление книги -->
                <div id="tab-add" class="tab-content active">
                    <h2>➕ Добавить книгу</h2>
                    <form id="addBookForm" onsubmit="addBook(event)">
                        <div class="form-group">
                            <label>Название *</label>
                            <input type="text" id="bookTitle" required>
                        </div>
                        <div class="form-group">
                            <label>Автор *</label>
                            <input type="text" id="bookAuthor" required>
                        </div>
                        <div class="form-group">
                            <label>ISBN</label>
                            <input type="text" id="bookIsbn">
                        </div>
                        <div class="form-group">
                            <label>Издательство</label>
                            <input type="text" id="bookPublisher">
                        </div>
                        <div class="form-group">
                            <label>Год</label>
                            <input type="number" id="bookYear">
                        </div>
                        <div class="form-group">
                            <label>Количество</label>
                            <input type="number" id="bookCopies" value="1" min="1">
                        </div>
                        <div class="form-group">
                            <label>Описание</label>
                            <textarea id="bookDescription" rows="3"></textarea>
                        </div>
                        <button type="submit" class="btn-primary">➕ Добавить</button>
                    </form>
                    <div id="addResult"></div>
                </div>

                <!-- Управление -->
                <div id="tab-manage" class="tab-content">
                    <h2>📝 Управление книгами</h2>
                    <div id="manageBooks"></div>
                </div>

                <!-- Выдача -->
                <div id="tab-loans" class="tab-content">
                    <h2>📋 Выдача книг</h2>
                    <div class="form-group">
                        <label>ID книги</label>
                        <input type="number" id="loanBookId" placeholder="ID книги">
                    </div>
                    <div class="form-group">
                        <label>ID пользователя</label>
                        <input type="number" id="loanUserId" placeholder="ID пользователя">
                    </div>
                    <div class="form-group">
                        <label>Срок (дней)</label>
                        <input type="number" id="loanDays" value="14">
                    </div>
                    <button onclick="createLoan()" class="btn-primary">📤 Выдать книгу</button>
                    <div id="loanResult"></div>
                    
                    <h3 style="margin-top: 2rem;">Активные выдачи</h3>
                    <div id="loansList"></div>
                </div>

                <!-- Бэкап -->
                <div id="tab-backup" class="tab-content">
                    <h2>💾 Резервное копирование</h2>
                    <button onclick="createBackup()" class="btn-primary">💾 Создать бэкап</button>
                    <div id="backupResult" style="margin-top: 1rem;"></div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>© 2026 Библиотечная система. Все права защищены.</p>
        </div>
    </footer>

    <script src="/js/admin.js"></script>
</body>
</html>
