<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Библиотека - Админка</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <nav class="container">
            <div class="logo">📚 Библиотека</div>
            <ul class="nav-links">
                <li><a href="/">Главная</a></li>
                <li><a href="/catalog.html">Каталог</a></li>
                <li><a href="/admin.html" class="active">Админка</a></li>
                <li><a href="/profile.html">👤 Профиль</a></li>
            </ul>
            <div class="admin-user" id="adminUser">👑 Администратор</div>
        </nav>
    </header>

    <main>
        <section class="admin-section">
            <div class="container">
                <h1>⚙️ Администрирование</h1>
                
                <div class="admin-tabs">
                    <button class="tab-btn active" onclick="showTab('give')">📤 Выдача</button>
                    <button class="tab-btn" onclick="showTab('loans')">📋 Выдачи</button>
                    <button class="tab-btn" onclick="showTab('users')">👥 Пользователи</button>
                    <button class="tab-btn" onclick="showTab('add')">➕ Добавить</button>
                    <button class="tab-btn" onclick="showTab('manage')">📝 Управление</button>
                </div>

                <!-- Вкладка: Выдача -->
                <div id="tab-give" class="tab-content active">
                    <h2>📤 Выдать книгу</h2>
                    <div class="form-group">
                        <label>Пользователь *</label>
                        <select id="loanUserSelect" style="width: 100%; max-width: 500px; padding: 0.7rem; border: 1px solid #ddd; border-radius: 4px;">
                            <option value="">Загрузка...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Книга *</label>
                        <select id="loanBookSelect" style="width: 100%; max-width: 500px; padding: 0.7rem; border: 1px solid #ddd; border-radius: 4px;">
                            <option value="">Загрузка...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Срок (дней)</label>
                        <input type="number" id="loanDays" value="14" style="max-width: 100px;">
                    </div>
                    <button onclick="createLoan()" class="btn-primary">📤 Выдать книгу</button>
                    <div id="loanGiveResult" style="margin-top: 1rem;"></div>

                    <h3 style="margin-top: 2rem;">📋 Активные выдачи</h3>
                    <div id="activeLoansList"></div>
                </div>

                <!-- Вкладка: Все выдачи -->
                <div id="tab-loans" class="tab-content">
                    <h2>📋 История выдач</h2>
                    <div id="loansList"></div>
                </div>

                <!-- Вкладка: Пользователи -->
                <div id="tab-users" class="tab-content">
                    <h2>👥 Управление пользователями</h2>
                    <div id="usersList"></div>
                </div>

                <!-- Вкладка: Добавление -->
                <div id="tab-add" class="tab-content">
                    <h2>➕ Добавить книгу</h2>
                    <form id="addBookForm" onsubmit="addBook(event)">
                        <div class="form-group">
                            <label>Название *</label>
                            <input type="text" id="bookTitle" required>
                        </div>
                        <div class="form-group">
                            <label>Автор *</label>
                            <input type="text" id="bookAuthor" required>
                        </div>
                        <div class="form-group">
                            <label>ISBN</label>
                            <input type="text" id="bookIsbn">
                        </div>
                        <div class="form-group">
                            <label>Издательство</label>
                            <input type="text" id="bookPublisher">
                        </div>
                        <div class="form-group">
                            <label>Год</label>
                            <input type="number" id="bookYear">
                        </div>
                        <div class="form-group">
                            <label>Количество</label>
                            <input type="number" id="bookCopies" value="1" min="1">
                        </div>
                        <div class="form-group">
                            <label>Описание</label>
                            <textarea id="bookDescription" rows="3"></textarea>
                        </div>
                        <button type="submit" class="btn-primary">➕ Добавить</button>
                    </form>
                    <div id="addResult"></div>
                </div>

                <!-- Вкладка: Управление -->
                <div id="tab-manage" class="tab-content">
                    <h2>📝 Управление книгами</h2>
                    <div id="manageBooks"></div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>© 2026 Библиотечная система. Все права защищены.</p>
        </div>
    </footer>

    <script src="/js/admin.js"></script>
</body>
</html>
