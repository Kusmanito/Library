<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Библиотека - Каталог</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <nav class="container">
            <div class="logo">📚 Библиотека</div>
            <ul class="nav-links" id="navLinks">
                <!-- Загружается через JS -->
            </ul>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Поиск книг..." onkeyup="filterBooks()">
                <button onclick="filterBooks()">🔍</button>
            </div>
        </nav>
    </header>

    <main>
        <section class="catalog-section">
            <div class="container">
                <h1>📖 Каталог книг</h1>
                
                <div class="filters">
                    <select id="authorFilter" onchange="filterBooks()">
                        <option value="">Все авторы</option>
                    </select>
                    <select id="yearFilter" onchange="filterBooks()">
                        <option value="">Все годы</option>
                    </select>
                    <button onclick="clearFilters()" class="btn-secondary">Сбросить</button>
                </div>

                <div class="books-grid" id="catalogGrid"></div>
                <div class="pagination" id="pagination"></div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>© 2026 Библиотечная система. Все права защищены.</p>
        </div>
    </footer>

    <script src="/js/catalog.js"></script>
<script>
    (function trackVisit() {
        const userId = localStorage.getItem('userId');
        const username = localStorage.getItem('username') || 'guest';
        const page = window.location.pathname;

        fetch('/api/visit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ user_id: userId, username, page })
        }).catch(() => {});
    })();
</script>
</body>
</html>
